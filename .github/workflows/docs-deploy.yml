name: Docs Deploy (GitHub Pages)

# Manual deployment of the documentation site to GitHub Pages.
# Triggered on demand only (workflow_dispatch) — never automatically.
# Prerequisite (one-time): repo Settings -> Pages -> Source = "GitHub Actions".
on:
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
